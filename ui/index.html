<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
  />
  <title>Gear Genix — College Equipment Booking</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --glass: rgba(255, 255, 255, 0.06);
      --glass-strong: rgba(255, 255, 255, 0.1);
      --glass-border: rgba(255, 255, 255, 0.12);
      --glass-border-hover: rgba(255, 255, 255, 0.22);
      --blur: blur(20px);
      --text-primary: #f0f0f5;
      --text-secondary: #b0b8d0;
      --text-muted: #6b7a9a;
      --accent-1: #a855f7;
      --accent-2: #7c3aed;
      --accent-3: #c084fc;
      --radius: 16px;
      --radius-sm: 12px;
    }

    /* ── LIGHT THEME ────────────────────── */
    [data-theme="light"] {
      --glass: rgba(0, 0, 0, 0.04);
      --glass-strong: rgba(0, 0, 0, 0.06);
      --glass-border: rgba(0, 0, 0, 0.1);
      --glass-border-hover: rgba(0, 0, 0, 0.18);
      --text-primary: #1a1a2e;
      --text-secondary: #4a4a6a;
      --text-muted: #8888a8;
    }

    [data-theme="light"] .bg {
      background: #f5f0ff;
    }

    [data-theme="light"] .bg-orb:nth-child(1) {
      background: radial-gradient(circle, rgba(168, 85, 247, 0.25), transparent 70%);
    }

    [data-theme="light"] .bg-orb:nth-child(2) {
      background: radial-gradient(circle, rgba(147, 51, 234, 0.2), transparent 70%);
    }

    [data-theme="light"] .bg-orb:nth-child(3) {
      background: radial-gradient(circle, rgba(192, 132, 252, 0.2), transparent 70%);
    }

    [data-theme="light"] .bot .bubble {
      background: rgba(255, 255, 255, 0.7);
      border-color: rgba(0, 0, 0, 0.08);
    }

    [data-theme="light"] .user .bubble {
      box-shadow: 0 4px 20px rgba(168, 85, 247, 0.2);
    }

    [data-theme="light"] textarea {
      background: rgba(255, 255, 255, 0.6);
    }

    [data-theme="light"] textarea:focus {
      background: rgba(255, 255, 255, 0.8);
    }

    [data-theme="light"] .quick-btn {
      background: rgba(255, 255, 255, 0.5);
    }

    [data-theme="light"] .welcome-card {
      background: rgba(255, 255, 255, 0.6);
    }

    [data-theme="light"] .messages::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.12);
    }

    [data-theme="light"] .messages::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 0, 0, 0.2);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    /* ── ANIMATED GRADIENT BG ──────────── */
    .bg {
      position: fixed;
      inset: 0;
      background: #0c0a1a;
      overflow: hidden;
      z-index: 0;
    }

    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.5;
      animation: orb-float 12s ease-in-out infinite alternate;
    }

    .bg-orb:nth-child(1) {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, #a855f7, transparent 70%);
      top: -10%;
      left: -5%;
      animation-duration: 14s;
    }

    .bg-orb:nth-child(2) {
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, #9333ea, transparent 70%);
      bottom: -15%;
      right: -10%;
      animation-duration: 18s;
      animation-delay: -4s;
    }

    .bg-orb:nth-child(3) {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, #c084fc, transparent 70%);
      top: 40%;
      left: 50%;
      opacity: 0.3;
      animation-duration: 16s;
      animation-delay: -8s;
    }

    @keyframes orb-float {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, -30px) scale(1.15); }
    }

    /* ── APP ROOT ───────────────────────── */
    .app {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ─────────────────────────── */
    .header {
      flex-shrink: 0;
      padding: 16px 24px;
      background: var(--glass);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .header-avatar {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.15rem;
      flex-shrink: 0;
      box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
    }

    .header-info {
      flex: 1;
      min-width: 0;
    }

    .header-title {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .header-status {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 3px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      background: #34d399;
      border-radius: 50%;
      box-shadow: 0 0 6px rgba(52, 211, 153, 0.6);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }

    .status-text {
      font-size: 0.73rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* ── THEME TOGGLE ──────────────────── */
    .theme-toggle {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      background: var(--glass);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s ease;
      flex-shrink: 0;
    }

    .theme-toggle:hover {
      background: rgba(168, 85, 247, 0.15);
      border-color: rgba(168, 85, 247, 0.4);
      color: var(--text-primary);
    }

    .theme-toggle svg {
      width: 18px;
      height: 18px;
    }

    .theme-toggle .icon-sun { display: none; }
    .theme-toggle .icon-moon { display: block; }

    [data-theme="light"] .theme-toggle .icon-sun { display: block; }
    [data-theme="light"] .theme-toggle .icon-moon { display: none; }

    /* ── QUICK ACTIONS ─────────────────── */
    .quick-actions {
      flex-shrink: 0;
      display: flex;
      gap: 8px;
      padding: 12px 24px;
      overflow-x: auto;
      background: rgba(255, 255, 255, 0.02);
      border-bottom: 1px solid var(--glass-border);
      scrollbar-width: none;
    }

    .quick-actions::-webkit-scrollbar {
      display: none;
    }

    .quick-btn {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      color: var(--text-secondary);
      border-radius: 22px;
      padding: 8px 18px;
      font-size: 0.78rem;
      font-weight: 500;
      font-family: inherit;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.25s ease;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .quick-btn:hover {
      background: rgba(168, 85, 247, 0.15);
      border-color: rgba(168, 85, 247, 0.4);
      color: var(--text-primary);
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(168, 85, 247, 0.2);
    }

    .quick-btn:active {
      transform: translateY(0);
    }

    /* ── MESSAGES ───────────────────────── */
    .messages {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overscroll-behavior: contain;
      scroll-behavior: smooth;
    }

    .messages.no-scroll {
      overflow: hidden;
    }

    .messages::-webkit-scrollbar {
      width: 4px;
    }

    .messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .messages::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    .messages::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .msg {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      animation: msg-in 0.35s ease-out;
    }

    @keyframes msg-in {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg.user {
      flex-direction: row-reverse;
    }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      flex-shrink: 0;
    }

    .bot .msg-avatar {
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      box-shadow: 0 2px 8px rgba(168, 85, 247, 0.35);
    }

    .user .msg-avatar {
      background: linear-gradient(135deg, #e879f9, #a855f7);
      box-shadow: 0 2px 8px rgba(232, 121, 249, 0.3);
    }

    .bubble {
      max-width: 70%;
      padding: 14px 18px;
      border-radius: var(--radius);
      font-size: 0.875rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bot .bubble {
      background: var(--glass-strong);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-bottom-left-radius: 4px;
    }

    .user .bubble {
      background: linear-gradient(135deg, #a855f7, #7c3aed);
      color: #fff;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 20px rgba(168, 85, 247, 0.35);
    }

    /* ── TYPING INDICATOR ──────────────── */
    .typing-dots {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 0;
    }

    .typing-dots span {
      width: 7px;
      height: 7px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: typing-bounce 1.4s ease-in-out infinite;
    }

    .typing-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes typing-bounce {
      0%, 60%, 100% {
        transform: translateY(0);
        opacity: 0.3;
      }
      30% {
        transform: translateY(-7px);
        opacity: 1;
      }
    }

    /* ── INPUT BAR ─────────────────────── */
    .input-bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 24px;
      background: var(--glass);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border-top: 1px solid var(--glass-border);
    }

    textarea {
      width: 100%;
      resize: none;
      border-radius: var(--radius-sm);
      border: 1px solid var(--glass-border);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-primary);
      padding: 12px 16px;
      font-size: 16px;
      font-family: inherit;
      max-height: 120px;
      line-height: 1.5;
      transition: all 0.25s ease;
    }

    textarea::placeholder {
      color: var(--text-muted);
    }

    textarea:focus {
      outline: none;
      border-color: rgba(168, 85, 247, 0.5);
      box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.15), 0 0 20px rgba(168, 85, 247, 0.1);
      background: rgba(255, 255, 255, 0.07);
    }

    button.send {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s ease;
      flex-shrink: 0;
      box-shadow: 0 4px 15px rgba(168, 85, 247, 0.35);
    }

    button.send:hover:not(:disabled) {
      transform: scale(1.08);
      box-shadow: 0 6px 25px rgba(168, 85, 247, 0.5);
    }

    button.send:active:not(:disabled) {
      transform: scale(0.95);
    }

    button.send:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    button.send svg {
      width: 20px;
      height: 20px;
    }

    /* ── WELCOME HERO ──────────────────── */
    .welcome-hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      animation: msg-in 0.5s ease-out;
      flex: 1;
      min-height: 0;
    }

    .welcome-avatar {
      width: 72px;
      height: 72px;
      border-radius: 22px;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      box-shadow: 0 8px 30px rgba(168, 85, 247, 0.4);
      animation: avatar-breathe 3s ease-in-out infinite;
      margin-bottom: 20px;
    }

    @keyframes avatar-breathe {
      0%, 100% {
        transform: translateY(0) scale(1);
        box-shadow: 0 8px 30px rgba(168, 85, 247, 0.4);
      }
      50% {
        transform: translateY(-6px) scale(1.05);
        box-shadow: 0 14px 40px rgba(168, 85, 247, 0.55);
      }
    }

    .welcome-title {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #e0c3fc, #a855f7, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .welcome-subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .welcome-card {
      background: var(--glass-strong);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 20px 24px;
      text-align: left;
      font-size: 0.85rem;
      line-height: 1.8;
      color: var(--text-secondary);
      max-width: 420px;
      width: 100%;
    }

    .welcome-card strong {
      color: var(--text-primary);
    }

    .input-wrapper {
      flex: 1;
      position: relative;
    }

    /* ── RESPONSIVE ────────────────────── */
    @media (max-width: 600px) {
      .header {
        padding: 14px 16px;
      }

      .quick-actions {
        padding: 10px 16px;
      }

      .messages {
        padding: 16px;
        gap: 14px;
      }

      .bubble {
        max-width: 85%;
      }

      .input-bar {
        padding: 12px 16px;
      }
    }
  </style>
</head>

<body>

<!-- ANIMATED BACKGROUND -->
<div class="bg">
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
</div>

<div class="app">
  <!-- HEADER -->
  <div class="header">
    <div class="header-avatar">&#9881;</div>
    <div class="header-info">
      <div class="header-title">Gear Genix</div>
      <div class="header-status">
        <div class="status-dot"></div>
        <span class="status-text">Online — ready to help</span>
      </div>
    </div>
    <button class="theme-toggle" id="themeToggle" title="Toggle theme">
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
    </button>
  </div>

  <!-- QUICK ACTIONS -->
  <div class="quick-actions">
    <button class="quick-btn" onclick="prefill('What equipment do you have?')">&#128230; List Equipment</button>
    <button class="quick-btn" onclick="prefill('I want to book equipment')">&#128197; Book</button>
    <button class="quick-btn" onclick="prefill('Show my bookings')">&#128203; My Bookings</button>
    <button class="quick-btn" onclick="prefill('I want to return equipment')">&#128260; Return</button>
  </div>

  <!-- MESSAGES -->
  <div class="messages" id="messages"></div>

  <!-- INPUT -->
  <div class="input-bar">
    <div class="input-wrapper">
      <textarea
        id="input"
        rows="1"
        placeholder="Ask me about equipment, bookings, availability..."
      ></textarea>
    </div>
    <button class="send" id="sendBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<script>
  /* ── SESSION ───────────────────────────── */
  const sessionId = crypto.randomUUID();

  /* ── DOM REFS ─────────────────────────── */
  const messages = document.getElementById('messages');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');

  /* ── HELPERS ──────────────────────────── */
  function scrollBottom() {
    messages.scrollTop = messages.scrollHeight;
  }

  function addMessage(text, role) {
    const m = document.createElement('div');
    m.className = 'msg ' + role;

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.innerHTML = role === 'bot' ? '&#9881;' : '&#128100;';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\n/g, '<br>');

    m.appendChild(avatar);
    m.appendChild(bubble);
    messages.appendChild(m);
    scrollBottom();
  }

  function showTyping() {
    const t = document.createElement('div');
    t.className = 'msg bot';
    t.id = 'typing';

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.innerHTML = '&#9881;';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';

    t.appendChild(avatar);
    t.appendChild(bubble);
    messages.appendChild(t);
    scrollBottom();
  }

  function hideTyping() {
    document.getElementById('typing')?.remove();
  }

  function prefill(text) {
    input.value = text;
    input.focus();
  }

  /* ── SEND MESSAGE (BACKEND CONNECTED) ─── */
  async function send() {
    const text = input.value.trim();
    if (!text) return;

    const hero = document.getElementById('welcomeHero');
    if (hero) {
      hero.remove();
      messages.classList.remove('no-scroll');
    }

    addMessage(text, 'user');
    input.value = '';
    sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: text,
          session_id: sessionId
        })
      });

      hideTyping();

      if (!res.ok) {
        addMessage(`\u26a0\ufe0f Server error (${res.status})`, 'bot');
      } else {
        const data = await res.json();
        addMessage(data.response || '(no response)', 'bot');
      }
    } catch (err) {
      hideTyping();
      addMessage(`\u26a0\ufe0f Network error: ${err.message}`, 'bot');
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  /* ── EVENTS ───────────────────────────── */
  sendBtn.addEventListener('click', send);

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  /* ── WELCOME HERO + NO-SCROLL ────────── */
  messages.classList.add('no-scroll');
  const welcomeHero = document.createElement('div');
  welcomeHero.className = 'welcome-hero';
  welcomeHero.id = 'welcomeHero';
  welcomeHero.innerHTML = `
    <div class="welcome-avatar">&#9881;</div>
    <div class="welcome-title">Welcome to Gear Genix</div>
    <div class="welcome-subtitle">College Equipment Booking Assistant</div>
    <div class="welcome-card">
      <strong>I can help you:</strong><br>
      \ud83d\udce6 Check what equipment is available<br>
      \ud83d\udd0d Check availability for a time slot<br>
      \ud83d\udcc5 Book equipment for your club<br>
      \ud83d\udccb View your club\u2019s bookings<br>
      \u274c Cancel a booking<br>
      \ud83d\udd04 Return equipment<br><br>
      Just type in plain English!<br>
      <span style="color: var(--text-muted);">e.g. \u201cIs the projector free tomorrow 3\u20135pm?\u201d</span>
    </div>
  `;
  messages.appendChild(welcomeHero);

  /* ── THEME TOGGLE ───────────────────── */
  const themeToggle = document.getElementById('themeToggle');
  themeToggle.addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
  });

  const savedTheme = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', savedTheme);
</script>

</body>
</html>
